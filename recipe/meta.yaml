{% set name = "frictionless" %}
{% set version = "4.40.11" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: e7d83d82cd3273820c74ac715e8d78285697f1eceda49a2417a72f839420d42e

build:
  number: 0
  entry_points:
    - frictionless = frictionless.__main__:program
  script: {{ PYTHON }} -m pip install . --no-deps -vv --no-build-isolation

requirements:
  host:
    - python
    - pip
  run:
    - python
    - petl >=1.6
    - marko >=1.0,<2
    - pyyaml >=5.3
    - isodate >=0.6
    - rfc3986 >=1.4
    - chardet >=3.0
    - requests >=2.10
    - jsonschema >=2.5
    - simpleeval >=0.9.11
    - stringcase >=1.2
    - typer >=0.5
    - validators >=0.18
    - python-slugify >=1.2
    - python-dateutil >=2.8
    - tabulate >=0.8.10
    - jinja2 >=3.0.3

test:
  imports:
    - frictionless
  commands:
    - frictionless --help
    - pip check
    - python -c "from importlib.metadata import version; assert(version('{{ name }}')=='{{ version }}')"
    # upstream tests require data files and take too much time to run
  requires:
    - pip

about:
  home: http://github.com/frictionlessdata/frictionless-py
  license: MIT
  license_family: MIT
  license_file: LICENSE.md
  summary: Frictionless is a framework to describe, extract, validate, and transform tabular data

extra:
  recipe-maintainers:
    - roll
